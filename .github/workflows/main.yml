# 工作流名称（GitHub页面显示的名字）
name: OK仓库演示工作流

# 触发条件：push到main分支、发起PR到main分支时自动运行
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# 任务运行环境（Ubuntu最新系统）
jobs:
  demo-ci:
    runs-on: ubuntu-latest
    
    # 工作流执行步骤
    steps:
    # 步骤1：检出仓库代码（官方标准Action）
    - name: 检出仓库代码
      uses: actions/checkout@v4

    # 步骤2：打印运行环境信息
    - name: 查看运行环境
      run: |
        echo "当前运行系统：Ubuntu Latest"
        echo "当前仓库：${{ github.repository }}"
        echo "触发分支：${{ github.ref }}"

    # 步骤3：模拟项目检查/测试
    - name: 模拟项目测试
      run: |
        echo "========== 开始项目测试 =========="
        ls -la  # 查看仓库根目录文件
        echo "测试环节：无报错，全部通过"

    # 步骤4：模拟构建/打包
    - name: 模拟项目构建
      run: |
        echo "========== 开始项目构建 =========="
        mkdir build-output
        echo "构建完成，产物已生成" > build-output/result.txt
        ls build-output/

    # 步骤5：最终完成提示
    - name: 工作流执行完成
      run: echo "✅ jianjian-15/ok 仓库工作流全部执行成功"
